asyncapi: 3.1.0
info:
  title: Smart Wastebin MQTT Interface
  version: 1.0.0
  description: |
    Event-driven messaging interface for the Smart Wastebin system.
    All communication goes through an MQTT broker (Mosquitto).    

servers:
  mosquitto:
    host: localhost:1883
    protocol: mqtt
    description: Local Mosquitto broker on the Raspberry Pi

channels:
  motionEvents:
    address: smartbin/{bin_id}/{sensor_id}/events
    description: Full motion event records published by the producer
    parameters:
      bin_id:
        description: Wastebin identifier (e.g., bin-01)
      sensor_id:
        description: Sensor identifier (e.g., pir-01)
    messages:
      motionEvent:
        $ref: '#/components/messages/MotionEvent'

  motionState:
    address: smartbin/{bin_id}/{sensor_id}/motion
    description: Simple motion state for Home Assistant (detected/clear)
    parameters:
      bin_id:
        description: Wastebin identifier
      sensor_id:
        description: Sensor identifier
    messages:
      motionState:
        $ref: '#/components/messages/MotionState'

  binStatus:
    address: smartbin/{bin_id}/status
    description: Retained message with current bin status and metadata
    parameters:
      bin_id:
        description: Wastebin identifier
    messages:
      binStatus:
        $ref: '#/components/messages/BinStatus'

  eventCount:
    address: smartbin/{bin_id}/{sensor_id}/event_count
    description: Running numeric counter of total motion events detected
    parameters:
      bin_id:
        description: Wastebin identifier
      sensor_id:
        description: Sensor identifier
    messages:
      eventCount:
        $ref: '#/components/messages/EventCount'

  usageIntensity:
    address: smartbin/{bin_id}/usage_intensity
    description: Rule-based usage intensity evaluated over a time window
    parameters:
      bin_id:
        description: Wastebin identifier
    messages:
      usageIntensity:
        $ref: '#/components/messages/UsageIntensity'

  usagePrediction:
    address: smartbin/{bin_id}/usage_prediction
    description: ML-based prediction of busy/quiet periods for the next hour
    parameters:
      bin_id:
        description: Wastebin identifier
    messages:
      usagePrediction:
        $ref: '#/components/messages/UsagePrediction'

  criticalAlert:
    address: smartbin/{bin_id}/alerts/critical
    description: Active high-priority critical fill alert published by Node-RED (fill > 75%)
    parameters:
      bin_id:
        description: Wastebin identifier
    messages:
      criticalAlert:
        $ref: '#/components/messages/CriticalAlert'

  warningAlert:
    address: smartbin/{bin_id}/alerts/warning
    description: Active warning fill alert published by Node-RED (fill 50% - 75%)
    parameters:
      bin_id:
        description: Wastebin identifier
    messages:
      warningAlert:
        $ref: '#/components/messages/WarningAlert'

  alertAckPipeline:
    address: smartbin/{bin_id}/alerts/ack
    description: Retained alert acknowledgment forwarded into the main pipeline by the bridge
    parameters:
      bin_id:
        description: Wastebin identifier
    messages:
      alertAck:
        $ref: '#/components/messages/AlertAck'

  ultrasonicEvents:
    address: smartbin/{bin_id}/ultrasonic-01/events
    description: Full ultrasonic event records published by the producer
    parameters:
      bin_id:
        description: Wastebin identifier (e.g., bin-01)
    messages:
      ultrasonicEvent:
        $ref: '#/components/messages/UltrasonicEvent'

  weightEvents:
    address: smartbin/{bin_id}/weight-01/events
    description: Full weight event records published by the producer
    parameters:
      bin_id:
        description: Wastebin identifier (e.g., bin-01)
    messages:
      weightEvent:
        $ref: '#/components/messages/WeightEvent'

  nodeRedStatus:
    address: smartbin/nodered/status
    description: Node-RED broker connection status (birth/will/close retained messages)
    messages:
      nodeRedStatus:
        $ref: '#/components/messages/NodeRedStatus'

  nodeRedHeartbeat:
    address: smartbin/nodered/heartbeat
    description: Heartbeat packet injected every 30 seconds by Node-RED to confirm health
    messages:
      nodeRedHeartbeat:
        $ref: '#/components/messages/NodeRedHeartbeat'

  nodeRedUsageIntensity:
    address: smartbin/nodered/usage_intensity
    description: Redundant rule-based usage intensity evaluated and published by Node-RED Flow B
    messages:
      nodeRedUsageIntensity:
        $ref: '#/components/messages/NodeRedUsageIntensity'

  nodeRedMlDisplay:
    address: smartbin/nodered/ml_display
    description: Custom prediction metrics formatted for display cards by Node-RED Flow E
    messages:
      nodeRedMlDisplay:
        $ref: '#/components/messages/NodeRedMlDisplay'

  nodeRedAlertLog:
    address: smartbin/nodered/alert_log
    description: Circular buffer event log for alerts forwarded by Node-RED to the Python bridge
    messages:
      nodeRedAlertLog:
        $ref: '#/components/messages/NodeRedAlertLog'

  nodeRedAlertAck:
    address: smartbin/nodered/alert_ack
    description: Control topic where the Node-RED dashboard publishes alert acknowledgements
    messages:
      nodeRedAlertAck:
        $ref: '#/components/messages/NodeRedAlertAck'

operations:
  publishMotionEvent:
    action: send
    channel:
      $ref: '#/channels/motionEvents'
    summary: Producer publishes a full motion event record
    description: |
      Published by the producer whenever the PIR sensor detects motion.
      Contains the full observation record with timestamps, sensor reference,
      and JSON-LD context.      

  consumeMotionEvent:
    action: receive
    channel:
      $ref: '#/channels/motionEvents'
    summary: Consumer receives motion events and writes them to JSONL
    description: |
      The consumer subscribes to this channel, enriches each event with
      ingest_time and pipeline_latency_ms, and writes the result to a
      sensor-specific JSONL file.      

  publishMotionState:
    action: send
    channel:
      $ref: '#/channels/motionState'
    summary: Producer publishes simple motion state for Home Assistant

  publishBinStatus:
    action: send
    channel:
      $ref: '#/channels/binStatus'
    summary: Status update published as a retained message

  publishEventCount:
    action: send
    channel:
      $ref: '#/channels/eventCount'
    summary: Producer publishes running event counter

  publishUsageIntensity:
    action: send
    channel:
      $ref: '#/channels/usageIntensity'
    summary: Virtual sensor publishes evaluated usage intensity

  publishUsagePrediction:
    action: send
    channel:
      $ref: '#/channels/usagePrediction'
    summary: ML virtual sensor publishes hourly usage prediction

  publishCriticalAlert:
    action: send
    channel:
      $ref: '#/channels/criticalAlert'
    summary: Node-RED publishes a critical fill level alert

  publishWarningAlert:
    action: send
    channel:
      $ref: '#/channels/warningAlert'
    summary: Node-RED publishes a warning fill level alert

  publishAlertAck:
    action: send
    channel:
      $ref: '#/channels/alertAckPipeline'
    summary: Python bridge publishes an alert acknowledgment into the main pipeline

  publishUltrasonicEvents:
    action: send
    channel:
      $ref: '#/channels/ultrasonicEvents'
    summary: Simulator publishes mock ultrasonic telemetry events

  publishWeightEvents:
    action: send
    channel:
      $ref: '#/channels/weightEvents'
    summary: Simulator publishes mock weight telemetry events

  publishNodeRedStatus:
    action: send
    channel:
      $ref: '#/channels/nodeRedStatus'
    summary: Node-RED runtime publishes connection status (birth/will/close)

  publishNodeRedHeartbeat:
    action: send
    channel:
      $ref: '#/channels/nodeRedHeartbeat'
    summary: Node-RED publishes a recurring health heartbeat

  publishNodeRedUsageIntensity:
    action: send
    channel:
      $ref: '#/channels/nodeRedUsageIntensity'
    summary: Node-RED Flow B publishes evaluated usage intensity

  publishNodeRedMlDisplay:
    action: send
    channel:
      $ref: '#/channels/nodeRedMlDisplay'
    summary: Node-RED Flow E publishes formatted ML display card data

  publishNodeRedAlertLog:
    action: send
    channel:
      $ref: '#/channels/nodeRedAlertLog'
    summary: Node-RED Flow D publishes an alert event to the logging bridge

  publishNodeRedAlertAck:
    action: send
    channel:
      $ref: '#/channels/nodeRedAlertAck'
    summary: Node-RED Dashboard publishes an operator alert acknowledgment

components:
  messages:
    MotionEvent:
      name: MotionEvent
      contentType: application/json
      payload:
        type: object
        properties:
          "@context":
            type: string
            description: JSON-LD context reference
          "@type":
            type: string
            description: Observation type
            example: sosa:Observation
          device_id:
            type: string
            description: Identifier of the device (full URN)
            example: "urn:dev:team05:pir-01"
          sensor_ref:
            type: string
            description: URI of the sensor that produced this event
            example: "urn:dev:team05:pir-01"
          wastebin_ref:
            type: string
            description: URI of the wastebin this sensor is mounted on
            example: "urn:wastebin:bin-01"
          environment_ref:
            type: string
            description: URI of the deployment environment
            example: "urn:env:kypes-02"
          event_time:
            type: string
            format: date-time
            description: ISO 8601 timestamp of when the event occurred
          event_type:
            type: string
            description: Type of event detected
            example: motion
          motion_state:
            type: string
            description: Motion state detected
            enum: [detected, clear]
          seq:
            type: integer
            description: Sequence number within this pipeline run
          run_id:
            type: string
            description: UUID identifying this pipeline run

    MotionState:
      name: MotionState
      contentType: text/plain
      payload:
        type: string
        enum: [detected, clear]
        description: Simple motion state string for Home Assistant

    BinStatus:
      name: BinStatus
      contentType: application/json
      payload:
        type: object
        properties:
          state:
            type: string
            description: Current bin state
            enum: [active, emptied, full, maintenance]
          location:
            type: string
            description: Human-readable location
          last_motion:
            type: string
            format: date-time
            description: Timestamp of most recent motion event
          total_events_today:
            type: integer
            description: Total number of motion events recorded today

    EventCount:
      name: EventCount
      contentType: text/plain
      payload:
        type: string
        description: String representation of an integer counting total events

    UsageIntensity:
      name: UsageIntensity
      contentType: application/json
      payload:
        type: object
        properties:
          state:
            type: string
            enum: [idle, low, medium, high]
            description: Usage state
          count:
            type: integer
            description: Number of events in the window
          window_minutes:
            type: integer
            description: Evaluation window size in minutes
          timestamp:
            type: number
            description: Unix timestamp of the evaluation

    UsagePrediction:
      name: UsagePrediction
      contentType: application/json
      payload:
        type: object
        properties:
          prediction:
            type: array
            items:
              type: string
            description: Predicted usage state
          confidence:
            type: number
            description: Confidence of the prediction
          predicted_hour:
            type: integer
            description: The hour being predicted
          utc_prediction_timestamp:
            type: number
            description: Unix timestamp when prediction was made
          model_name:
            type: string
            description: Name of the model used
          features_used:
            type: object
            description: Features used for the prediction

    CriticalAlert:
      name: CriticalAlert
      contentType: application/json
      payload:
        type: object
        properties:
          bin_id:
            type: string
            description: Identifier of the wastebin
            example: "bin-01"
          level:
            type: string
            enum: [CRITICAL]
          fill_pct:
            type: integer
            description: Current fill percentage
            example: 85
          weight_g:
            type: number
            description: Current weight in grams
            example: 4200
          timestamp:
            type: string
            format: date-time
            description: ISO 8601 timestamp of alert generation

    WarningAlert:
      name: WarningAlert
      contentType: application/json
      payload:
        type: object
        properties:
          bin_id:
            type: string
            description: Identifier of the wastebin
            example: "bin-01"
          level:
            type: string
            enum: [HIGH]
          fill_pct:
            type: integer
            description: Current fill percentage
            example: 65
          weight_g:
            type: number
            description: Current weight in grams
            example: 3100
          timestamp:
            type: string
            format: date-time
            description: ISO 8601 timestamp of alert generation

    AlertAck:
      name: AlertAck
      contentType: application/json
      payload:
        type: object
        properties:
          bin_id:
            type: string
            description: Identifier of the wastebin
            example: "bin-01"
          level:
            type: string
            description: Alert level that was acknowledged (HIGH or CRITICAL)
            example: "CRITICAL"
          ack_at:
            type: string
            format: date-time
            description: ISO 8601 timestamp of acknowledgment
          ack_by:
            type: string
            description: Operator or system component that acknowledged the alert
            example: "Node-RED Dashboard"

    UltrasonicEvent:
      name: UltrasonicEvent
      contentType: application/json
      payload:
        type: object
        properties:
          "@context":
            type: object
            description: JSON-LD context reference
          "@type":
            type: string
            description: Observation type
            example: sosa:Observation
          device_id:
            type: string
            description: Identifier of the device (full URN)
            example: "urn:dev:team05:ultrasonic-01"
          sensor_ref:
            type: string
            description: URI of the sensor that produced this event
            example: "urn:dev:team05:ultrasonic-01"
          wastebin_ref:
            type: string
            description: URI of the wastebin this sensor is mounted on
            example: "urn:wastebin:bin-01"
          environment_ref:
            type: string
            description: URI of the deployment environment
            example: "urn:env:kypes-02"
          event_time:
            type: string
            format: date-time
            description: ISO 8601 timestamp of when the event occurred
          event_type:
            type: string
            description: Type of event detected
            example: ultrasonic
          distance_cm:
            type: number
            description: Distance to trash in cm
            example: 12.34
          fill_pct:
            type: integer
            description: Current fill percentage (0 to 100)
            example: 15
          pulse_width_s:
            type: number
            description: Round-trip echo pulse width in seconds
            example: 0.000725
          seq:
            type: integer
            description: Sequence number within this pipeline run
          run_id:
            type: string
            description: UUID identifying this pipeline run

    WeightEvent:
      name: WeightEvent
      contentType: application/json
      payload:
        type: object
        properties:
          "@context":
            type: object
            description: JSON-LD context reference
          "@type":
            type: string
            description: Observation type
            example: sosa:Observation
          device_id:
            type: string
            description: Identifier of the device (full URN)
            example: "urn:dev:team05:weight-01"
          sensor_ref:
            type: string
            description: URI of the sensor that produced this event
            example: "urn:dev:team05:weight-01"
          wastebin_ref:
            type: string
            description: URI of the wastebin this sensor is mounted on
            example: "urn:wastebin:bin-01"
          environment_ref:
            type: string
            description: URI of the deployment environment
            example: "urn:env:kypes-02"
          event_time:
            type: string
            format: date-time
            description: ISO 8601 timestamp of when the event occurred
          event_type:
            type: string
            description: Type of event detected
            example: weight
          weight_kg:
            type: number
            description: Current weight in kilograms
            example: 0.52
          weight_g:
            type: number
            description: Current weight in grams
            example: 520.0
          seq:
            type: integer
            description: Sequence number within this pipeline run
          run_id:
            type: string
            description: UUID identifying this pipeline run

    MotionTelemetry:
      name: MotionTelemetry
      contentType: text/plain
      payload:
        type: string
        enum: [detected, clear]
        description: Simple motion detection state
        example: "detected"

    NodeRedStatus:
      name: NodeRedStatus
      contentType: application/json
      payload:
        type: object
        properties:
          state:
            type: string
            enum: [online, offline]
            description: Node-RED MQTT connection status
            example: "online"

    NodeRedHeartbeat:
      name: NodeRedHeartbeat
      contentType: application/json
      payload:
        type: object
        properties:
          timestamp:
            type: string
            format: date-time
            description: ISO 8601 heartbeat timestamp
          uptime_seconds:
            type: integer
            description: Node-RED container uptime in seconds
            example: 1200

    NodeRedUsageIntensity:
      name: NodeRedUsageIntensity
      contentType: application/json
      payload:
        type: object
        properties:
          bin_id:
            type: string
            description: Identifier of the wastebin
            example: "bin-01"
          level:
            type: string
            enum: [LOW, MEDIUM, HIGH, CRITICAL]
            description: Rule-based intensity evaluated by Node-RED
          fill_pct:
            type: integer
            description: Current fill percentage
            example: 82
          weight_g:
            type: number
            description: Current weight in grams
            example: 4100
          timestamp:
            type: string
            format: date-time
            description: ISO 8601 timestamp of the evaluation

    NodeRedMlDisplay:
      name: NodeRedMlDisplay
      contentType: application/json
      payload:
        type: object
        properties:
          prediction:
            type: string
            description: Predicted usage state
            example: "busy"
          confidence:
            type: number
            description: Prediction confidence
            example: 0.85
          predicted_hour:
            type: integer
            description: Hour predicted (0-23)
            example: 14
          timestamp:
            type: string
            format: date-time
            description: ISO 8601 timestamp of processed display card

    NodeRedAlertLog:
      name: NodeRedAlertLog
      contentType: application/json
      payload:
        type: object
        properties:
          bin_id:
            type: string
            description: Identifier of the wastebin
            example: "bin-01"
          level:
            type: string
            enum: [HIGH, CRITICAL]
          fill_pct:
            type: number
            description: Fill percentage
          weight_g:
            type: number
            description: Weight in grams
          timestamp:
            type: string
            format: date-time
            description: ISO 8601 alert log timestamp

    NodeRedAlertAck:
      name: NodeRedAlertAck
      contentType: application/json
      payload:
        type: object
        properties:
          bin_id:
            type: string
            description: Identifier of the wastebin
            example: "bin-01"
          level:
            type: string
            description: Alert level to acknowledge (HIGH or CRITICAL)
            example: "CRITICAL"
          operator:
            type: string
            description: Operator name or dashboard instance performing the action
            example: "Node-RED Dashboard"
