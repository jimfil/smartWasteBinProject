services:
  # MQTT Broker (message backbone)
  broker:
    image: eclipse-mosquitto:latest
    container_name: mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - broker-data:/mosquitto/data
      - broker-logs:/mosquitto/log
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mosquitto_sub", "-h", "127.0.0.1", "-p", "1883", "-t", "health/ping", "-E" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # MQTT Producer (sensor data source)
  producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mqtt-producer
    depends_on:
      broker:
        condition: service_healthy
    privileged: true
    devices:
      - "/dev/gpiomem0:/dev/gpiomem"
      - "/dev/gpiochip0:/dev/gpiochip0"
    volumes:
      - ./:/app
    restart: unless-stopped
    environment:
      BROKER_HOST: broker
      BROKER_PORT: 1883
    command:
      - python
      - src/producer.py
      - --sensor-id
      - "urn:dev:team05:pir-01"
      - --pin
      - "4"
      - --sample-interval
      - "0.1"
      - --cooldown
      - "5.0"
      - --min-high
      - "0.5"
      - --broker
      - "broker"
      - --port
      - "1883"
      - --verbose

  # MQTT Consumer (event logger)
  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mqtt-consumer
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./data:/data
    restart: unless-stopped
    environment:
      BROKER_HOST: broker
      BROKER_PORT: 1883
    command:
      - python
      - src/consumer.py
      - --sensor-id
      - "urn:dev:team05:pir-01"
      - --broker
      - "broker"
      - --port
      - "1883"
      - --qos
      - "1"
      - --out
      - "/data/motion_events.log"
      - --verbose

  # MQTT Dashboard (real-time event viewer)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mqtt-dashboard
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - ./:/app
    restart: unless-stopped
    environment:
      BROKER_HOST: broker
      BROKER_PORT: 1883
      PYTHONUNBUFFERED: "1"
    command:
      - python
      - src/dashboard.py
      - --broker
      - "broker"
      - --port
      - "1883"
      - --topic
      - "smartbin/#"
      - --verbose

  # MQTT Archiver (permanent data archive)
  archiver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mqtt-archiver
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./data:/data
    restart: unless-stopped
    environment:
      BROKER_HOST: broker
      BROKER_PORT: 1883
    command:
      - python
      - src/archiver.py
      - --broker
      - "broker"
      - --port
      - "1883"
      - --topic
      - "smartbin/#"
      - --out
      - "/data/archive.log"
      - --verbose

  # REST API (Flask application)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mqtt-api
    depends_on:
      broker:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./:/app
      - ./data:/data
    restart: unless-stopped
    environment:
      BROKER_HOST: broker
      BROKER_PORT: 1883
      PYTHONUNBUFFERED: "1"
    command:
      - python
      - src/api.py

  # Virtual Sensor Rules (usage intensity)
  virtual-sensor-rules:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mqtt-virtual-sensor-rules
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - ./:/app
    restart: unless-stopped
    environment:
      BROKER_HOST: broker
      BROKER_PORT: 1883
      PYTHONUNBUFFERED: "1"
    command:
      - python
      - src/virtual_sensor_rules.py
      - --broker
      - "broker"
      - --port
      - "1883"
      - --subscribe-topic
      - "smartbin/bin-01/pir-01/events"
      - --publish-topic
      - "smartbin/bin-01/usage_intensity"
      - --bin-id
      - "bin-01"

  # Virtual Sensor ML (usage prediction)
  virtual-sensor-ml:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mqtt-virtual-sensor-ml
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - ./:/app
    restart: unless-stopped
    environment:
      BROKER_HOST: broker
      BROKER_PORT: 1883
      PYTHONUNBUFFERED: "1"
    command:
      - python
      - src/virtual_sensor_ml.py
      - --model-path
      - "src/models/busy_predictor.joblib"
      - --broker
      - "broker"
      - --port
      - "1883"
      - --publish-topic
      - "smartbin/bin-01/usage_prediction"
      - --bin-id
      - "bin-01"

  # Virtual Sensor HA (Home Assistant Bridge)
  virtual-sensor-ha:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mqtt-virtual-sensor-ha
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - ./:/app
    restart: unless-stopped
    environment:
      BROKER_HOST: broker
      BROKER_PORT: 1883
      PYTHONUNBUFFERED: "1"
    command:
      - python
      - src/virtual_sensor_ha.py
      - --broker
      - "broker"
      - --port
      - "1883"
      - --bin-id
      - "bin-01"
      - --verbose

  # Home Assistant (User Interface and Automation)
  homeassistant:
    image: "ghcr.io/home-assistant/home-assistant:stable"
    container_name: homeassistant
    volumes:
      - ./hass-config:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
    depends_on:
      broker:
        condition: service_healthy

  # Node-RED (Low-Code Plumbing and Dashboard)
  nodered:
    image: nodered/node-red:latest
    container_name: node-red
    ports:
      - "1880:1880"
    volumes:
      - ./nodered_data:/data
    environment:
      - NODE_RED_CREDENTIAL_SECRET=smartbin-super-secret-key-12345!
      - FLOWS=flows.json
    depends_on:
      broker:
        condition: service_healthy
    restart: unless-stopped

  # Node-RED Bidirectional Bridge
  nodered-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mqtt-nodered-bridge
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./data:/data
    environment:
      BROKER_HOST: broker
      BROKER_PORT: 1883
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped
    command:
      - python
      - src/nodered_bridge.py

volumes:
  broker-data:
  broker-logs:

