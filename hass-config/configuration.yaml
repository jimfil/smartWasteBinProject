# Loads default set of integrations. Do not remove.
default_config:

# Enable the Frontend dashboard UI
frontend:

# Configure the REST command to acknowledge specific alerts via the Python REST API
rest_command:
  ack_specific_alert:
    url: "http://api:5000/api/nodered/alerts/ack"
    method: POST
    content_type: "application/json"
    payload: '{"bin_id": "{{ bin_id }}", "timestamp": "{{ timestamp }}"}'

# Fetch the live list of alerts from the Node-RED proxy API
sensor:
  - platform: rest
    name: recent_bin_alerts
    resource: "http://nodered:1880/nodered/api/recent-events"
    value_template: "{{ value_json.alerts | length }}"
    json_attributes:
      - alerts

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
